server:
  host: 127.0.0.1
  port: 8000
  reload: false

auth:
  enabled: true
  api_keys:
    - key: sk-demo
      name: demo-user
      rpm: 60
    - key: sk-test
      name: test-user
      rpm: 120

models:
  # Use mock-small when you want the gateway to run without Ollama.
  # Change this to llama3.1 or qwen2.5 after pulling the model locally.
  default: mock-small
  items:
    - name: mock-small
      backend: mock
      target: mock-small

    # Requires: ollama pull llama3.1
    - name: llama3.1
      backend: ollama
      target: llama3.1
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull qwen2.5:1.5b
    - name: qwen2.5
      backend: ollama
      target: qwen2.5:1.5b
      endpoint: http://127.0.0.1:11434

cache:
  enabled: true
  ttl_seconds: 300
  max_size: 1024

logging:
  level: INFO
  request_logs_enabled: true
  request_log_path: logs/requests.jsonl
