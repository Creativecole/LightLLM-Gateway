server:
  host: 127.0.0.1
  port: 8000
  reload: false

auth:
  enabled: true
  api_keys:
    - key: sk-demo
      name: demo-user
      rpm: 60
    - key: sk-test
      name: test-user
      rpm: 120

models:
  # Use mock-small when you want the gateway to run without Ollama or vLLM.
  # Change this to an Ollama or vLLM model after starting the matching server.
  default: qwen-vllm
  items:
    - name: mock-small
      backend: mock
      target: mock-small

    # Requires: ollama pull llama3.1
    - name: llama3.1
      backend: ollama
      target: llama3.1
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull llama3.2
    - name: llama3.2
      backend: ollama
      target: llama3.2
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull qwen2.5:1.5b
    - name: qwen2.5
      backend: ollama
      target: qwen2.5:1.5b
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull qwen2.5:0.5b
    - name: qwen2.5-0.5b
      backend: ollama
      target: qwen2.5:0.5b
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull qwen2.5-coder:1.5b
    - name: qwen2.5-coder
      backend: ollama
      target: qwen2.5-coder:1.5b
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull mistral
    - name: mistral
      backend: ollama
      target: mistral
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull gemma2:2b
    - name: gemma2
      backend: ollama
      target: gemma2:2b
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull phi3:mini
    - name: phi3
      backend: ollama
      target: phi3:mini
      endpoint: http://127.0.0.1:11434

    # Requires: ollama pull deepseek-r1:1.5b
    - name: deepseek-r1
      backend: ollama
      target: deepseek-r1:1.5b
      endpoint: http://127.0.0.1:11434

    # Requires a vLLM OpenAI-compatible server on port 8001.
    # Example:
    # python -m vllm.entrypoints.openai.api_server \
    #   --model Qwen/Qwen2.5-1.5B-Instruct \
    #   --host 127.0.0.1 \
    #   --port 8001
    - name: qwen-vllm
      backend: vllm
      target: Qwen/Qwen2.5-1.5B-Instruct
      endpoint: http://127.0.0.1:8001

cache:
  enabled: true
  ttl_seconds: 300
  max_size: 1024

logging:
  level: INFO
  request_logs_enabled: true
  request_log_path: logs/requests.jsonl
