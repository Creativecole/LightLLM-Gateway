server:
  host: 127.0.0.1
  port: 8000
  reload: false

auth:
  enabled: true
  api_keys:
    - key: sk-demo
      name: demo-user
      rpm: 60

models:
  default: qwen2.5
  items:
    - name: qwen2.5
      backend: ollama
      target: qwen2.5:0.5b
      endpoint: http://127.0.0.1:11434
    - name: mock-small
      backend: mock
      target: mock-small

cache:
  enabled: true
  ttl_seconds: 300
  max_size: 1024

logging:
  level: INFO
  request_logs_enabled: true
  request_log_path: logs/requests.jsonl
