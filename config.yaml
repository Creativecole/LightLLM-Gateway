server:
  host: 127.0.0.1
  port: 8000
  reload: false

auth:
  enabled: true
  api_keys:
    - key: sk-demo
      name: demo-user
      rpm: 60

models:
  # Local development default. Use mock-small when you do not have Ollama running.
  default: mock-small
  items:
    - name: mock-small
      backend: mock
      target: mock-small

    # Example Ollama models. Run the matching `ollama pull ...` before selecting one.
    - name: llama3.1
      backend: ollama
      target: llama3.1
      endpoint: http://127.0.0.1:11434

    - name: llama3.2
      backend: ollama
      target: llama3.2
      endpoint: http://127.0.0.1:11434

    - name: qwen2.5
      backend: ollama
      target: qwen2.5:1.5b
      endpoint: http://127.0.0.1:11434

    - name: qwen2.5-0.5b
      backend: ollama
      target: qwen2.5:0.5b
      endpoint: http://127.0.0.1:11434

    - name: qwen2.5-coder
      backend: ollama
      target: qwen2.5-coder:1.5b
      endpoint: http://127.0.0.1:11434

    - name: mistral
      backend: ollama
      target: mistral
      endpoint: http://127.0.0.1:11434

    - name: gemma2
      backend: ollama
      target: gemma2:2b
      endpoint: http://127.0.0.1:11434

    - name: phi3
      backend: ollama
      target: phi3:mini
      endpoint: http://127.0.0.1:11434

    - name: deepseek-r1
      backend: ollama
      target: deepseek-r1:1.5b
      endpoint: http://127.0.0.1:11434

cache:
  enabled: true
  ttl_seconds: 300
  max_size: 1024

logging:
  level: INFO
  request_logs_enabled: true
  request_log_path: logs/requests.jsonl
