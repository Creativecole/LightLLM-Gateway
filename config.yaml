server:
  host: 127.0.0.1
  port: 8000
  reload: false

auth:
  enabled: true
  api_keys:
    - key: sk-demo
      name: demo-user
      rpm: 60

models:
  default: mock-small
  items:
    - name: mock-small
      backend: mock
      target: mock-small
    - name: llama3.1
      backend: ollama
      target: llama3.1
      endpoint: http://127.0.0.1:11434

cache:
  enabled: true
  ttl_seconds: 300
  max_size: 1024

logging:
  level: INFO
  request_logs_enabled: true
  request_log_path: logs/requests.jsonl
